name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Debug Project Structure
      run: |
        echo "--- /src Content ---"
        ls -R src/
        echo "--- /tests Content ---"
        ls -R tests/

    - name: Run Pytest
      run: |
        pytest
